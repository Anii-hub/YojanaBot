# ── YojanaBot — Render Infrastructure as Code ────────────────────────────────
# Deploy with: Render Dashboard → New → Blueprint → connect this repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: yojanabot
    runtime: python
    region: oregon           # Change to: frankfurt, singapore, ohio as needed

    # ── Build & Start ────────────────────────────────────────────────────────
    buildCommand: "./build.sh"
    startCommand: "gunicorn scheme_finder.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --log-level info"

    # ── Plan ─────────────────────────────────────────────────────────────────
    # Free tier: 512 MB RAM, no persistent disk, spins down after 15 min idle.
    # Cold starts will re-download the HF model (~300 MB) and rebuild the
    # ChromaDB index from data/processed/scheme_chunks_step2.json (committed).
    plan: free

    # ── Environment Variables ────────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"

      - key: DJANGO_DEBUG
        value: "True"   # TEMP: enable for debugging — revert to False after error is identified

      # Auto-generated secure Django secret key — safe to use as-is
      - key: DJANGO_SECRET_KEY
        generateValue: true

      # !! Set this in the Render dashboard — do NOT hardcode here !!
      - key: GROQ_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"

      # On free tier there is no persistent disk, so we cache to /tmp.
      # This means the model re-downloads on every cold start (~300 MB).
      - key: TRANSFORMERS_CACHE
        value: "/tmp/huggingface"
      - key: HF_HOME
        value: "/tmp/huggingface"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: "/tmp/sentence_transformers"

    # ── Health check — Render waits for this to return 200 before routing traffic
    healthCheckPath: /health/
