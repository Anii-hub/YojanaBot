# ── YojanaBot — Render Infrastructure as Code ────────────────────────────────
# Deploy with: Render Dashboard → New → Blueprint → connect this repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: yojanabot
    runtime: python
    region: oregon           # Change to: frankfurt, singapore, ohio as needed

    # ── Build & Start ────────────────────────────────────────────────────────
    buildCommand: "./build.sh"
    startCommand: "gunicorn scheme_finder.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 600 --keep-alive 5 --max-requests 100 --max-requests-jitter 20 --log-level info"

    # ── Plan ─────────────────────────────────────────────────────────────────
    # Free tier: 512 MB RAM, no persistent disk, spins down after 15 min idle.
    # Use the lightweight JSON retriever by default so form submissions do not
    # load PyTorch/sentence-transformers inside the web worker.
    plan: free

    # ── Environment Variables ────────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"

      - key: DJANGO_DEBUG
        value: "False"

      # Auto-generated secure Django secret key — safe to use as-is
      - key: DJANGO_SECRET_KEY
        generateValue: true

      # !! Set this in the Render dashboard — do NOT hardcode here !!
      - key: GROQ_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"

      # free-tier safe default. Set to "vector" on a larger instance if you
      # want ChromaDB + sentence-transformers semantic retrieval.
      - key: YOJANA_RETRIEVER_MODE
        value: "lightweight"

      # On free tier there is no persistent disk, so we cache to /tmp.
      # This means the model re-downloads on every cold start (~300 MB).
      - key: TRANSFORMERS_CACHE
        value: "/tmp/huggingface"
      - key: HF_HOME
        value: "/tmp/huggingface"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: "/tmp/sentence_transformers"

      # Force anonymous HuggingFace Hub downloads.
      # A bad/expired HF_TOKEN causes 401 on public models — these vars
      # prevent any implicit token from being sent during model download.
      - key: HF_HUB_DISABLE_IMPLICIT_TOKEN
        value: "1"
      - key: HUGGINGFACE_HUB_VERBOSITY
        value: "warning"
      # Suppress fork-safety warning from HF tokenizers under gunicorn
      - key: TOKENIZERS_PARALLELISM
        value: "false"

    # ── Health check — Render waits for this to return 200 before routing traffic
    healthCheckPath: /health/
